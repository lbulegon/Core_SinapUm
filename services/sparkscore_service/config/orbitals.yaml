# Configuração dos Orbitais - SparkScore
# Orbitais são camadas funcionais de análise semiótica e psicodinâmica

# Configuração dos Orbitais Cognitivos (0-6) - Sistema original
orbitals:
  - id: 0
    name: "Ruído"
    description: "Estímulo não integrado - Pré-significação"
    function: "Filtro de ruído / descarte"
    motor: "noise_filter"
    ppa_relation: null
    
  - id: 1
    name: "Reconhecimento"
    description: "Já vi isso antes - Familiaridade"
    function: "Similaridade / memória curta"
    motor: "similarity_engine"
    ppa_relation: null
    
  - id: 2
    name: "Expectativa"
    description: "Antecipação - PPA nasce aqui"
    function: "Motor de PPA"
    motor: "ppa_engine"
    ppa_relation: "nasce"
    
  - id: 3
    name: "Alinhamento"
    description: "Coerência simbólica - Confiança"
    function: "Coerência simbólica"
    motor: "coherence_engine"
    ppa_relation: "validado"
    
  - id: 4
    name: "Engajamento"
    description: "Vínculo ativo - Decisão"
    function: "Call-to-Action"
    motor: "engagement_engine"
    ppa_relation: "ativado"
    
  - id: 5
    name: "Memória"
    description: "Fixação simbólica - Retenção"
    function: "Retenção / repetição"
    motor: "retention_engine"
    ppa_relation: null
    
  - id: 6
    name: "Efeito Mandela"
    description: "Reescrita coletiva - Mito / Narrativa"
    function: "Propagação narrativa"
    motor: "narrative_engine"
    ppa_relation: "cristalizado"

# Sinais para classificação orbital
classification_signals:
  - "familiaridade_percebida"
  - "coerencia_simbolica"
  - "antecipacao_ppa"
  - "intensidade_emocional"
  - "recorrencia_coletiva"
  - "tempo_exposicao"

# Relação PPA com Orbitais
ppa_flow:
  nasce: 2
  validado: 3
  ativado: 4
  cristalizado: 6

# Configuração dos Orbitais de Análise (MVP Creative Engine)
# Orbitais ativos (enabled: true) são executados e retornam scores
# Orbitais placeholder (enabled: false) retornam apenas explicação
orbital_configs:
  semiotic:
    enabled: true
    description: "Análise semiótica: CTA, coerência, redundância"
  
  emotional:
    enabled: true
    description: "Análise emocional: valência, urgência, tom"
  
  cognitive:
    enabled: true
    description: "Análise cognitiva: densidade, clareza, adequação"
  
  narrative:
    enabled: false
    description: "Análise narrativa: estrutura, arco, coerência temporal (placeholder)"
  
  cultural:
    enabled: false
    description: "Análise cultural: adequação, referências, sensibilidade (placeholder)"
  
  ethical:
    enabled: false
    description: "Análise ética: transparência, honestidade, responsabilidade (placeholder)"
  
  psychoanalytic:
    enabled: false
    description: "Análise psicanalítica: símbolos, arquétipos, desejos latentes (placeholder)"
  
  temporal:
    enabled: false
    description: "Análise temporal: timing, sazonalidade, urgência (placeholder)"
  
  social:
    enabled: false
    description: "Análise social: viralidade, compartilhamento, engajamento (placeholder)"
  
  csv:
    enabled: true
    description: "Circulação Simbólica Vetorial: fluxo vetorial, propagação, adequação ao canal"

  environmental_indiciary:
    enabled: false

    description: >
      Orbital de análise indiciária do ambiente operacional. Interpreta sinais fracos
      (indícios) gerados pela interação entre espaço, equipamentos e agentes humanos,
      inferindo estados emergentes do sistema como pressão, sobrecarga ou estabilidade.

    type: analytical

    methodology:
      base: indiciary_semiosis
      references:
        - peirce
        - ginzburg
        - out_of_control

    inputs:
      primary:
        - indicios_ambientais
      secondary:
        - contexto_operacional
        - dados_comportamentais

    signals:
      - ruido
      - fumaca
      - cheiro
      - densidade
      - contaminacao_artefato
      - ritmo_operacional

    processing:
      model: weighted_indiciary_inference
      normalization: 0_1
      aggregation: weighted_mean
      weights:
        ruido: 0.2
        fumaca: 0.15
        cheiro: 0.1
        densidade: 0.25
        contaminacao_artefato: 0.2
        ritmo_operacional: 0.1

    outputs:
      - estado_ambiental
      - score_pressao
      - score_estabilidade
      - alertas

    states:
      - estavel
      - atencao
      - pressao
      - sobrecarga
      - colapso

    thresholds:
      atencao: 0.4
      pressao: 0.6
      sobrecarga: 0.8
      colapso: 0.95

    integration:
      affects:
        - cognitive
        - emotional
        - semiotic
      passive: true

    learning:
      enabled: true
      strategy: correlation_feedback

# Pipeline Creative Engine — pesos do overall_score e ponte PPA
pipeline:
  version: "1.2.0"
  # Pesos relativos (soma 1.0). Orbitais desativados saem da média; pesos restantes mantêm proporção.
  overall_score_weights:
    semiotic: 0.25
    emotional: 0.20
    cognitive: 0.25
    csv: 0.20
    environmental_indiciary: 0.10
  ppa_bridge:
    # Quanto score_pressao (0–1) amortece antecipacao_base (sinais fracos operacionais)
    pressure_dampening_alpha: 0.12
    # Evolução: multiplicar peso ambiental em estados críticos (ex.: 1.5 em sobrecarga/colapso)
    critical_state_weight_multiplier: 1.5

