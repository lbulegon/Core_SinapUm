# Compose standalone do vectorstore_service (FastAPI + FAISS).
# No monorepo, o serviço é incluído pelo docker-compose.yml da raiz.
services:
  vectorstore_service:
    build: .
    container_name: vectorstore_service
    ports:
      - "${VECTORSTORE_PORT:-8010}:8010"
    environment:
      - VECTORSTORE_DATA_DIR=${VECTORSTORE_DATA_DIR:-/data}
      - VECTORSTORE_MODEL=${VECTORSTORE_MODEL:-all-MiniLM-L6-v2}
    volumes:
      - vectorstore_data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  vectorstore_data:
