# Evolution API - Core_SinapUm
# MODE=image (padrao) -> usa imagem Docker Hub
# MODE=build -> usa docker-compose.override.yml (Dockerfile.evolution + patch PR #2365)
# Portas: 8004:8080 | Network: evolution-network (preservadas)

services:
  evolution-api:
    image: ${EVOLUTION_IMAGE:-atendai/evolution-api}:${EVOLUTION_IMAGE_TAG:-v2.2.3}
    pull_policy: always
    container_name: evolution-api
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "${EVOLUTION_PORT_EXTERNAL:-8004}:${EVOLUTION_PORT_INTERNAL:-8080}"
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL}
      PORT: 8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: ${EVOLUTION_DATABASE_ENABLED:-true}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${EVOLUTION_DB_URI}
      CACHE_REDIS_ENABLED: true
      CACHE_REDIS_URI: redis://redis:6379/0
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: false
      CACHE_LOCAL_ENABLED: false
      CONFIG_SESSION_PHONE_CLIENT: Chrome
      CONFIG_SESSION_PHONE_NAME: Evolution API
      QRCODE_LIMIT: ${EVOLUTION_QRCODE_LIMIT:-30}
      QRCODE_COLOR: ${EVOLUTION_QRCODE_COLOR:-'#198754'}
      WEBHOOK_GLOBAL_ENABLED: ${EVOLUTION_WEBHOOK_ENABLED:-true}
      WEBHOOK_GLOBAL_URL: ${EVOLUTION_WEBHOOK_URL}
      WEBSOCKET_ENABLED: true
      WEBSOCKET_GLOBAL_EVENTS: true
      LOG_LEVEL: ${EVOLUTION_LOG_LEVEL:-INFO}
      LOG_COLOR: "true"
      LOG_BAILEYS: ${EVOLUTION_LOG_BAILEYS:-info}
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    networks:
      - evolution-network
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: unless-stopped
    ports:
      - "${EVOLUTION_REDIS_PORT:-6379}:6379"
    volumes:
      - evolution_redis_data:/data
    networks:
      - evolution-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  evolution_instances:
  evolution_store:
  evolution_redis_data:

networks:
  evolution-network:
    driver: bridge
