services:
  # Banco de dados PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: mcp_sinapum_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mcp_sinapum}
      POSTGRES_USER: ${POSTGRES_USER:-mcp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcp_password_change_me}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcp_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mcp_network
    restart: unless-stopped

  # OpenMind AI Service
  openmind:
    build:
      context: ./services/openmind_service
      dockerfile: Dockerfile
    container_name: mcp_sinapum_openmind
    ports:
      - "8001:8001"
    env_file:
      - ./services/openmind_service/.env
    environment:
      - OPENMIND_AI_HOST=0.0.0.0
      - OPENMIND_AI_PORT=8001
      - OPENMIND_ORG_BASE_URL=${OPENMIND_ORG_BASE_URL:-}
      - OPENMIND_ORG_MODEL=${OPENMIND_ORG_MODEL:-gpt-4o}
      # OPENMIND_AI_API_KEY vem do env_file (.env), não sobrescrever aqui
      # Se precisar sobrescrever, use: - OPENMIND_AI_API_KEY=${OPENMIND_AI_KEY:-valor_do_env_file}
    volumes:
      - /root/data/vitrinezap/images:/data/vitrinezap/images:rw
      - openmind_logs:/var/log/openmind-ai:rw
    networks:
      - mcp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Aplicação Django MCP SinapUm (Core Registry)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp_sinapum_web
    command: gunicorn setup.wsgi:application --bind 0.0.0.0:5000 --workers 3 --timeout 120 --access-logfile - --error-logfile -
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/static
      - /root/data/vitrinezap/images:/data/vitrinezap/images
    ports:
      - "5000:5000"
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me-in-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mcp_user}:${POSTGRES_PASSWORD:-mcp_password_change_me}@db:5432/${POSTGRES_DB:-mcp_sinapum}
      - POSTGRES_DB=${POSTGRES_DB:-mcp_sinapum}
      - POSTGRES_USER=${POSTGRES_USER:-mcp_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mcp_password_change_me}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - OPENMIND_AI_URL=${OPENMIND_AI_URL:-http://openmind:8001}
      - OPENMIND_IMAGE_URL=${OPENMIND_IMAGE_URL:-http://openmind:8001}
      - OPENMIND_AI_KEY=${OPENMIND_AI_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SPARKSCORE_BASE_URL=${SPARKSCORE_BASE_URL:-http://sparkscore_service:8006}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,69.169.102.84,web}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-e6994b05d473440f6c677604ef39188867c4564c54908ea47fdb0f30005945e2}
      - REDIS_URL=${REDIS_URL:-redis://ddf_redis:6379/2}
      - REDIS_TTL_ENV_STATE=${REDIS_TTL_ENV_STATE:-300}
      - DDF_BASE_URL=${DDF_BASE_URL:-http://ddf_service:8005}
      - MCP_MAX_INPUT_BYTES=${MCP_MAX_INPUT_BYTES:-10485760}
      # WhatsApp Gateway Service (URL interna para comunicação Docker)
      - SINAPUM_WHATSAPP_GATEWAY_URL=http://whatsapp_gateway_service:8007
      - SINAPUM_WHATSAPP_GATEWAY_API_KEY=${SINAPUM_WHATSAPP_GATEWAY_API_KEY}
      - SINAPUM_WHATSAPP_GATEWAY_PORT=${SINAPUM_WHATSAPP_GATEWAY_PORT:-8007}
      - SINAPUM_CORE_BASE_URL=${SINAPUM_CORE_BASE_URL:-http://69.169.102.84:5000}
      - SINAPUM_WHATSAPP_WEBHOOK_URL=${SINAPUM_WHATSAPP_WEBHOOK_URL}
      - SINAPUM_WHATSAPP_AUTO_CONNECT=${SINAPUM_WHATSAPP_AUTO_CONNECT:-false}
      - EVORA_WHATSAPP_WEBHOOK_URL=${EVORA_WHATSAPP_WEBHOOK_URL:-https://evora-product.up.railway.app/api/whatsapp/webhook-from-gateway/}
      # ARQUITETURA NOVA - Feature Flags
      - FEATURE_EVOLUTION_MULTI_TENANT=${FEATURE_EVOLUTION_MULTI_TENANT:-false}
      - FEATURE_OPENMIND_ENABLED=${FEATURE_OPENMIND_ENABLED:-true}
      - EVOLUTION_BASE_URL=${EVOLUTION_BASE_URL:-http://69.169.102.84:8004}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-GKvy6psn-8HHpBQ4HAHKFOXnwjHR-oSzeGZzCaws0xg}
      - OPENMIND_BASE_URL=${OPENMIND_BASE_URL:-http://openmind:8001}
      - OPENMIND_TOKEN=${OPENMIND_TOKEN:-}
      - VITRINEZAP_BASE_URL=${VITRINEZAP_BASE_URL:-https://evora-product.up.railway.app}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:-}
      # WhatsApp Gateway - Provider Selection
      - WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER:-legacy}
      - WHATSAPP_GATEWAY_PROVIDER=${WHATSAPP_GATEWAY_PROVIDER:-gateway_service}
      # WhatsApp Gateway - Configurações de Envio
      - WHATSAPP_SEND_ENABLED=${WHATSAPP_SEND_ENABLED:-False}
      - WHATSAPP_SHADOW_MODE=${WHATSAPP_SHADOW_MODE:-True}
      - WHATSAPP_ENABLED_SHOPPERS=${WHATSAPP_ENABLED_SHOPPERS:-}
      # WhatsApp Canonical Events v1.0
      - WHATSAPP_CANONICAL_EVENTS_ENABLED=${WHATSAPP_CANONICAL_EVENTS_ENABLED:-True}
      - WHATSAPP_CANONICAL_SHADOW_MODE=${WHATSAPP_CANONICAL_SHADOW_MODE:-True}
      # WhatsApp Routing
      - WHATSAPP_ROUTING_ENABLED=${WHATSAPP_ROUTING_ENABLED:-False}
      - WHATSAPP_GROUP_ROUTING_ENABLED=${WHATSAPP_GROUP_ROUTING_ENABLED:-False}
      - WHATSAPP_ASSIGNMENT_POLICY=${WHATSAPP_ASSIGNMENT_POLICY:-default}
      # WhatsApp Simulator
      - WHATSAPP_SIM_ENABLED=${WHATSAPP_SIM_ENABLED:-True}
      # Architecture Intelligence Service (avaliação arquitetural)
      - ARCHITECTURE_SERVICE_URL=${ARCHITECTURE_SERVICE_URL:-http://architecture_intelligence_service:7025}
      # RAG / memória semântica (FAISS) — core.rag_query, EOC, mrfoo.order_feedback
      - VECTORSTORE_URL=${VECTORSTORE_URL:-http://vectorstore_service:8010}
      - VECTORSTORE_TIMEOUT=${VECTORSTORE_TIMEOUT:-15}
    depends_on:
      db:
        condition: service_healthy
      openmind:
        condition: service_healthy
      ddf_redis:
        condition: service_started
    networks:
      - mcp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MCP Service (FastAPI) - Gateway MCP
  mcp_service:
    build:
      context: ./services/mcp_service
      dockerfile: Dockerfile
    container_name: mcp_sinapum_mcp
    ports:
      - "7010:7010"
    environment:
      - SINAPUM_CORE_URL=http://web:5000
      - OPENMIND_SERVICE_URL=http://openmind:8001
      - OPENMIND_AI_KEY=${OPENMIND_AI_KEY:-}
    depends_on:
      web:
        condition: service_healthy
      openmind:
        condition: service_healthy
    networks:
      - mcp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # DDF Service (FastAPI) - Detect & Delegate Framework
  ddf_service:
    build:
      context: ./services/ddf_service
      dockerfile: Dockerfile
    container_name: mcp_sinapum_ddf
    ports:
      - "8005:8005"
    env_file:
      - ./services/ddf_service/.env
    environment:
      - DATABASE_URL=postgresql://ddf:ddf@ddf_postgres:5432/ddf
      - REDIS_URL=redis://ddf_redis:6379/0
      - STORAGE_PATH=/app/storage
      - PORT=8005
      - OPENMIND_BASE_URL=http://openmind:8001
    depends_on:
      ddf_redis:
        condition: service_started
      ddf_postgres:
        condition: service_healthy
      openmind:
        condition: service_healthy
    volumes:
      - ddf_storage:/app/storage
    networks:
      - mcp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # DDF Redis
  ddf_redis:
    image: redis:7-alpine
    container_name: mcp_sinapum_ddf_redis
    ports:
      - "6380:6379"
    volumes:
      - ddf_redis_data:/data
    networks:
      - mcp_network
    restart: unless-stopped

  # DDF PostgreSQL
  ddf_postgres:
    image: postgres:15-alpine
    container_name: mcp_sinapum_ddf_postgres
    environment:
      POSTGRES_DB: ddf
      POSTGRES_USER: ddf
      POSTGRES_PASSWORD: ddf
    ports:
      - "5434:5432"
    volumes:
      - ddf_postgres_data:/var/lib/postgresql/data
    networks:
      - mcp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddf"]
      interval: 10s
      timeout: 5s
      retries: 5

  # iFood Service (FastAPI)
  ifood_service:
    build:
      context: ./services/ifood_service
      dockerfile: Dockerfile
    container_name: mcp_sinapum_ifood
    ports:
      - "7020:7020"
    environment:
      - IFOOD_CLIENT_ID=${IFOOD_CLIENT_ID:-}
      - IFOOD_CLIENT_SECRET=${IFOOD_CLIENT_SECRET:-}
      - IFOOD_AUTH_BASE_URL=${IFOOD_AUTH_BASE_URL:-https://auth.ifood.com.br}
      - IFOOD_API_BASE_URL=${IFOOD_API_BASE_URL:-https://merchant-api.ifood.com.br}
      - IFOOD_REDIRECT_URI=${IFOOD_REDIRECT_URI:-http://localhost:7020/oauth/callback}
      - CORE_INTERNAL_BASE_URL=http://web:5000
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-e6994b05d473440f6c677604ef39188867c4564c54908ea47fdb0f30005945e2}
      - REDIS_URL=${REDIS_URL:-}
    depends_on:
      web:
        condition: service_healthy
    networks:
      - mcp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Chatwoot - Customer Support Platform
  chatwoot_postgres:
    image: pgvector/pgvector:pg16
    container_name: mcp_sinapum_chatwoot_postgres
    environment:
      - POSTGRES_DB=chatwoot
      - POSTGRES_USER=chatwoot
      - POSTGRES_PASSWORD=${CHATWOOT_POSTGRES_PASSWORD:-V$*@eSmnpmYfecMh!j0q%Kccq$6n4LhL}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - chatwoot_postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - mcp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwoot"]
      interval: 10s
      timeout: 5s
      retries: 5

  chatwoot_redis:
    image: redis:7-alpine
    container_name: mcp_sinapum_chatwoot_redis
    command: ["sh", "-c", "redis-server --requirepass \"${CHATWOOT_REDIS_PASSWORD:-8gnMzCwQI8LTLzJ2v1moAtCl0tHUZqtB}\""]
    volumes:
      - chatwoot_redis_data:/data
    ports:
      - "6381:6379"
    networks:
      - mcp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${CHATWOOT_REDIS_PASSWORD:-8gnMzCwQI8LTLzJ2v1moAtCl0tHUZqtB}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chatwoot_rails:
    image: chatwoot/chatwoot:latest
    container_name: mcp_sinapum_chatwoot_rails
    env_file:
      - ./services/chatwoot_service/.env
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - POSTGRES_HOST=chatwoot_postgres
      - POSTGRES_USERNAME=chatwoot
      - POSTGRES_PASSWORD=${CHATWOOT_POSTGRES_PASSWORD:-V$*@eSmnpmYfecMh!j0q%Kccq$6n4LhL}
      - REDIS_URL=redis://:${CHATWOOT_REDIS_PASSWORD:-8gnMzCwQI8LTLzJ2v1moAtCl0tHUZqtB}@chatwoot_redis:6379
      - REDIS_PASSWORD=${CHATWOOT_REDIS_PASSWORD:-8gnMzCwQI8LTLzJ2v1moAtCl0tHUZqtB}
    volumes:
      - chatwoot_storage_data:/app/storage
    ports:
      - "3001:3000"
    depends_on:
      chatwoot_postgres:
        condition: service_healthy
      chatwoot_redis:
        condition: service_healthy
    networks:
      - mcp_network
    restart: unless-stopped
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  chatwoot_sidekiq:
    image: chatwoot/chatwoot:latest
    container_name: mcp_sinapum_chatwoot_sidekiq
    env_file:
      - ./services/chatwoot_service/.env
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - POSTGRES_HOST=chatwoot_postgres
      - POSTGRES_USERNAME=chatwoot
      - POSTGRES_PASSWORD=${CHATWOOT_POSTGRES_PASSWORD:-V$*@eSmnpmYfecMh!j0q%Kccq$6n4LhL}
      - REDIS_URL=redis://:${CHATWOOT_REDIS_PASSWORD:-8gnMzCwQI8LTLzJ2v1moAtCl0tHUZqtB}@chatwoot_redis:6379
      - REDIS_PASSWORD=${CHATWOOT_REDIS_PASSWORD:-8gnMzCwQI8LTLzJ2v1moAtCl0tHUZqtB}
    volumes:
      - chatwoot_storage_data:/app/storage
    depends_on:
      chatwoot_postgres:
        condition: service_healthy
      chatwoot_redis:
        condition: service_healthy
    networks:
      - mcp_network
    restart: unless-stopped
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']

  # ShopperBot Service - IA Vendedora para VitrineZap
  shopperbot_service:
    build:
      context: ./services/shopperbot_service
      dockerfile: Dockerfile
    container_name: mcp_sinapum_shopperbot
    ports:
      - "7030:7030"
    environment:
      - PORT=7030
      - DEBUG=${SHOPPERBOT_DEBUG:-False}
      - STORAGE_PATH=/app/storage
      - LOG_LEVEL=${SHOPPERBOT_LOG_LEVEL:-INFO}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mcp_user}:${POSTGRES_PASSWORD:-mcp_password_change_me}@db:5432/${POSTGRES_DB:-mcp_sinapum}
      - MCP_CORE_URL=${MCP_CORE_URL:-http://web:5000}
      - MCP_ENABLED=${MCP_ENABLED:-true}
    volumes:
      - shopperbot_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mcp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # SparkScore Service - Sistema de Análise Psicológica e Semiótica
  sparkscore_service:
    build:
      context: ./services/sparkscore_service
      dockerfile: Dockerfile
    container_name: mcp_sinapum_sparkscore
    ports:
      - "8006:8006"
    environment:
      - PORT=8006
      - DEBUG=${SPARKSCORE_DEBUG:-False}
      - LOG_LEVEL=${SPARKSCORE_LOG_LEVEL:-INFO}
      - REDIS_URL=${REDIS_URL:-redis://ddf_redis:6379/2}
      - REDIS_TTL_ENV_STATE=${REDIS_TTL_ENV_STATE:-300}
      - ENV_HISTORY_MAX_LEN=${ENV_HISTORY_MAX_LEN:-100}
    depends_on:
      - ddf_redis
    networks:
      - mcp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Architecture Intelligence Service - Meta-orbital de inteligência arquitetural
  architecture_intelligence_service:
    build:
      context: ./services/architecture_intelligence_service
      dockerfile: Dockerfile
    container_name: mcp_sinapum_architecture_intelligence
    ports:
      - "7025:7025"
    environment:
      # Usa OpenMind.org API (chat/completions). Local openmind não expõe esse endpoint.
      - OPENMIND_SERVICE_URL=${OPENMIND_ORG_BASE_URL:-}
      - ARCHITECTURE_INTELLIGENCE_PORT=7025
      - OPENMIND_AI_KEY=${OPENMIND_AI_KEY:-}
    depends_on:
      openmind:
        condition: service_healthy
    networks:
      - mcp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7025/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # MLflow Tracking Server - Experiment Tracking & Model Registry
  # ============================================================
  mlflow_postgres:
    image: postgres:16-alpine
    container_name: core_sinapum_mlflow_postgres
    environment:
      POSTGRES_DB: ${MLFLOW_POSTGRES_DB:-mlflow_db}
      POSTGRES_USER: ${MLFLOW_POSTGRES_USER:-mlflow_user}
      POSTGRES_PASSWORD: ${MLFLOW_POSTGRES_PASSWORD:-mlflow_pass}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - mlflow_postgres_data:/var/lib/postgresql/data
    networks:
      - mcp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MLFLOW_POSTGRES_USER:-mlflow_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: ./services/mlflow_service
      dockerfile: Dockerfile
    container_name: core_sinapum_mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri ${MLFLOW_BACKEND_URI:-postgresql://mlflow_user:mlflow_pass@mlflow_postgres:5432/mlflow_db}
      --default-artifact-root ${MLFLOW_ARTIFACT_ROOT:-/mlflow/artifacts}
      --workers 2
    environment:
      GUNICORN_CMD_ARGS: "--timeout 120"
    env_file:
      - ./services/mlflow_service/.env
    ports:
      - "${MLFLOW_HOST_PORT:-5050}:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      mlflow_postgres:
        condition: service_healthy
    networks:
      - mcp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # WorldGraph Service (Neo4j) - Memória Diagramática
  worldgraph_service:
    image: neo4j:5
    container_name: mcp_sinapum_worldgraph
    ports:
      - "${WORLDGRAPH_HTTP_PORT:-7474}:7474"
      - "${WORLDGRAPH_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=${WORLDGRAPH_NEO4J_USER:-neo4j}/${WORLDGRAPH_NEO4J_PASSWORD:-neo4j12345}
      - NEO4J_server_memory_heap_initial__size=${WORLDGRAPH_HEAP_INITIAL:-1G}
      - NEO4J_server_memory_heap_max__size=${WORLDGRAPH_HEAP_MAX:-1G}
      - NEO4J_server_memory_pagecache_size=${WORLDGRAPH_PAGECACHE:-1G}
    volumes:
      - worldgraph_data:/data
      - worldgraph_logs:/logs
      - ./services/worldgraph_service/seed:/seed:ro
    networks:
      - mcp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # Vectorstore Service (FastAPI + FAISS) - Memória Semântica
  vectorstore_service:
    build:
      context: ./services/vectorstore_service
      dockerfile: Dockerfile
    container_name: mcp_sinapum_vectorstore
    ports:
      - "${VECTORSTORE_PORT:-8010}:8010"
    environment:
      - VECTORSTORE_DATA_DIR=/data
      - VECTORSTORE_MODEL=${VECTORSTORE_MODEL:-all-MiniLM-L6-v2}
    volumes:
      - vectorstore_data:/data
    networks:
      - mcp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # WhatsApp Gateway Service - Gateway WhatsApp usando Baileys
  whatsapp_gateway_service:
    build:
      context: ./services/whatsapp_gateway_service
      dockerfile: Dockerfile
    container_name: mcp_sinapum_whatsapp_gateway
    restart: unless-stopped
    ports:
      - "${SINAPUM_WHATSAPP_GATEWAY_PORT:-8007}:8007"
    environment:
      - PORT=8007
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - API_KEY=${SINAPUM_WHATSAPP_GATEWAY_API_KEY}
      - WEBHOOK_URL=http://web:5000/webhooks/whatsapp/
      - AUTH_DIR=/data/auth
      - AUTO_CONNECT=${SINAPUM_WHATSAPP_AUTO_CONNECT:-false}
    volumes:
      - wa_auth:/data/auth
    networks:
      - mcp_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  media_data:
    driver: local
  static_data:
    driver: local
  openmind_logs:
    driver: local
  ddf_storage:
    driver: local
  ddf_redis_data:
    driver: local
  ddf_postgres_data:
    driver: local
  chatwoot_postgres_data:
    driver: local
  chatwoot_redis_data:
    driver: local
  chatwoot_storage_data:
    driver: local
  shopperbot_storage:
